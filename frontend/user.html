<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>User Management</title>
  <!-- Latest compiled and minified CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
    integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/dataTables.bootstrap4.min.css"

    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/datatables.net-buttons-bs5/2.3.6/buttons.bootstrap5.min.css"

    crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"
    integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
    integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"

  <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"
    integrity="sha512-BkpSL20WETFylMrcirBahHfSnY++H2O1W+UnEEO4yNIl+jI2+zowyoGJpbtk6bx97fBXf++WJHSSK2MV4ghPcg=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="text/javascript" src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap4.min.js"></script>
  <script type="text/javascript" src="https://cdn.datatables.net/buttons/1.6.5/js/dataTables.buttons.min.js"></script>
  <script type="text/javascript" src="https://cdn.datatables.net/buttons/1.6.5/js/buttons.bootstrap4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.32/vfs_fonts.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.5/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.5/js/buttons.print.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"
    integrity="sha512-RdSPYh1WA6BF0RhpisYJVYkOyTzK4HwofJ3Q7ivt/jkpW6Vc8AurL1R+4AUcvn9IwEKAPm/fk7qFZW3OuiUDeg=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
    integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <!-- jQuery Validation Plugin -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/additional-methods.min.js"></script>

  <style>
    .role-badge, .status-badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .role-admin {
      background-color: #dc3545;
      color: white;
    }
    
    .role-user {
      background-color: #28a745;
      color: white;
    }
    
    .status-active {
      background-color: #28a745;
      color: white;
    }
    
    .status-deactivated {
      background-color: #6c757d;
      color: white;
    }
    
    .action-buttons {
      display: flex;
      gap: 5px;
      align-items: center;
      justify-content: center;
    }
    .action-buttons .btn {
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 6px;
      box-shadow: none;
      transition: box-shadow 0.2s, background 0.2s;
      padding: 0;
    }
    .action-buttons .btn-warning {
      background: #ffc107;
      color: #fff;
      border: none;
    }
    .action-buttons .btn-warning:hover {
      background: #e0a800;
      box-shadow: 0 2px 8px rgba(255,193,7,0.2);
    }
    .action-buttons .btn-secondary {
      background: #17a2b8;
      color: #fff;
      border: none;
    }
    .action-buttons .btn-secondary:hover {
      background: #138496;
      box-shadow: 0 2px 8px rgba(23,162,184,0.2);
    }
    .action-buttons i {
      font-size: 1.2rem;
      line-height: 1;
      color: #222;
    }
    
    .dataTables_wrapper .dt-buttons {
      margin-bottom: 10px;
    }
    
    .dataTables_wrapper .dt-buttons .btn {
      margin-right: 5px;
    }
    
    .table-responsive {
      margin-top: 20px;
    }
    
    .search-container {
      max-width: 300px;
    }
    
    /* Validation Styles */
    .error {
      color: #dc3545;
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }
    
    .form-control.is-invalid {
      border-color: #dc3545;
      box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
    }
    
    .form-control.is-valid {
      border-color: #28a745;
      box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
    }
    
    .password-strength {
      margin-top: 0.25rem;
      font-size: 0.875rem;
    }
    
    .password-strength.weak {
      color: #dc3545;
    }
    
    .password-strength.medium {
      color: #ffc107;
    }
    
    .password-strength.strong {
      color: #28a745;
    }
    
    /* Sorting Styles */
    .sortable {
      cursor: pointer;
      position: relative;
      user-select: none;
    }
    
    .sortable:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }
    
    .sortable i {
      margin-left: 5px;
      font-size: 12px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    
    .sortable:hover i {
      opacity: 1;
    }
    
    .sortable.sort-asc i {
      opacity: 1;
      transform: rotate(180deg);
    }
    
    .sortable.sort-desc i {
      opacity: 1;
    }
    
    .no-sort {
      cursor: default;
    }
    
    .no-sort i {
      display: none;
    }
  </style>
</head>

<body>

  <div id="header"></div>


  <div class="container-fluid py-4">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h3 class="mb-0">User Management</h3>
      </div>
      <div class="card-body">
        <div class="d-flex justify-content-between mb-4">
          <button type="button" class="btn btn-success" data-toggle="modal" data-target="#userModal">
            <i class="fas fa-plus"></i> Add New User
          </button>

          <div class="search-container">
            <div class="input-group">
              <input type="text" id="userSearch" class="form-control" placeholder="Search users...">
              <div class="input-group-append">
                <button class="btn btn-outline-secondary" type="button" id="searchButton">
                  <i class="fas fa-search"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="table-responsive">
          <table id="utable" class="table table-striped table-bordered table-hover" style="width:100%">
            <thead class="thead-dark">
              <tr>
                <th class="sortable" data-sort="user_id">User ID <i class="fas fa-sort"></i></th>
                <th class="sortable" data-sort="customer_id">Customer ID <i class="fas fa-sort"></i></th>
                <th class="no-sort">Photo</th>
                <th class="sortable" data-sort="title">Title <i class="fas fa-sort"></i></th>
                <th class="sortable" data-sort="fname">First Name <i class="fas fa-sort"></i></th>
                <th class="sortable" data-sort="lname">Last Name <i class="fas fa-sort"></i></th>
                <th class="sortable" data-sort="email">Email <i class="fas fa-sort"></i></th>
                <th class="sortable" data-sort="addressline">AddressLine <i class="fas fa-sort"></i></th>
                <th class="sortable" data-sort="town">Town <i class="fas fa-sort"></i></th>
                <th class="sortable" data-sort="phone">Phone <i class="fas fa-sort"></i></th>
                <th class="sortable" data-sort="role">Role <i class="fas fa-sort"></i></th>
                <th class="sortable" data-sort="status">Status <i class="fas fa-sort"></i></th>
                <th class="no-sort">Actions</th>
              </tr>
            </thead>
            <tbody id="ubody">

            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<div class="modal fade" id="userModal" tabindex="-1" role="dialog" aria-labelledby="userModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <form id="uform">
        <div class="modal-header">
          <h5 class="modal-title" id="userModalLabel">Add New User</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="user_name">Name *</label>
            <input type="text" class="form-control" id="user_name" name="name">
          </div>
          <div class="form-group">
            <label for="user_email">Email *</label>
            <input type="text" class="form-control" id="user_email" name="email">
          </div>
          <div class="form-group">
            <label for="user_password">Password *</label>
            <input type="password" class="form-control" id="user_password" name="password">
            <div class="password-strength" id="password-strength"></div>
          </div>
          <div class="form-group">
            <label for="user_image">Profile Image</label>
            <input type="file" class="form-control-file" id="user_image" name="image" accept="image/*">
            <small class="form-text text-muted">Accepted formats: JPG, JPEG, PNG</small>
          </div>
          <div class="form-group">
            <label for="user_title">Title</label>
            <input type="text" class="form-control" id="user_title" name="title">
          </div>
          <div class="form-group">
            <label for="user_fname">First Name *</label>
            <input type="text" class="form-control" id="user_fname" name="fname" required>
          </div>
          <div class="form-group">
            <label for="user_lname">Last Name *</label>
            <input type="text" class="form-control" id="user_lname" name="lname" required>
          </div>
          <div class="form-group">
            <label for="user_addressline">Address</label>
            <input type="text" class="form-control" id="user_addressline" name="addressline">
          </div>
          <div class="form-group">
            <label for="user_town">Town</label>
            <input type="text" class="form-control" id="user_town" name="town">
          </div>
          <div class="form-group">
            <label for="user_phone">Phone</label>
            <input type="text" class="form-control" id="user_phone" name="phone">
          </div>
          <div class="form-group">
            <label for="user_role">Role *</label>
            <select class="form-control" id="user_role" name="role">
              <option value="">Select Role</option>
              <option value="admin">Admin</option>
              <option value="user">User</option>
            </select>
          </div>
          <div id="role-description" class="text-muted small"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" id="userSubmit">Add User</button>
        </div>
      </form>
    </div>
  </div>
</div>

  <!-- Role Change Modal -->
  <div class="modal fade" id="roleModal" tabindex="-1" role="dialog" aria-labelledby="roleModalLabel"
    aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="roleModalLabel">Change User Role</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <form id="roleForm">
            <div class="form-group">
              <label for="new_role">Select New Role *</label>
              <select class="form-control" id="new_role" name="new_role" required>
                <option value="">Select Role</option>
                <option value="admin">Admin</option>
                <option value="user">User</option>
              </select>
            </div>
            <input type="hidden" id="role_user_id" name="role_user_id">
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-warning" id="roleSubmit">Change Role</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Change Modal -->
  <div class="modal fade" id="statusModal" tabindex="-1" role="dialog" aria-labelledby="statusModalLabel"
    aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="statusModalLabel">Change User Status</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <form id="statusForm">
            <div class="form-group">
              <label for="new_status">Select New Status *</label>
              <select class="form-control" id="new_status" name="new_status" required>
                <option value="">Select Status</option>
                <option value="active">Active</option>
                <option value="deactivated">Deactivated</option>
              </select>
            </div>
            <input type="hidden" id="status_user_id" name="status_user_id">
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-info" id="statusSubmit">Change Status</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

<script>
    $(document).ready(function () {

    // ========== CONFIGURATION ========== //
    const url = 'http://localhost:3000/';
    
    // ========== PAGINATION & SCROLL VARIABLES ========== //
    let currentPage = 1;
    const pageSize = 20;
    let loading = false;
    let allLoaded = false;
    let searchTerm = '';
    
    // ========== SORTING VARIABLES ========== //
    let currentSort = { field: 'user_id', direction: 'asc' };
    let allUsers = []; // Store all users for client-side sorting

    // ========== IMAGE HANDLING ========== //
    function handleImgError(img) {
      if (!img._defaulted) {
        img.src = '/assets/uploads/default.jpg';
        img._defaulted = true; // Prevent infinite loop if default image is missing
      }
    }

    // ========== RENDERING FUNCTIONS ========== //
    // Render user row
    function renderUserRow(user) {
      const roleClass = `role-${user.role.toLowerCase()}`;
      const statusClass = `status-${user.status.toLowerCase()}`;
      
      // User data processing
      
      // Handle empty or null image_path
      let photoUrl = '/assets/uploads/default.jpg';
      if (user.image_path && user.image_path.trim() !== '') {
        // Backend serves uploads from /uploads, so we use that path
        photoUrl = `/${user.image_path}`;
      }
      
      return `<tr>
        <td>${user.user_id || ''}</td>
        <td>${user.customer_id || ''}</td>
        <td><img src="${photoUrl}" alt="User Photo" class="user-photo" style="width:40px;height:40px;object-fit:cover;border-radius:50%;border:1.5px solid #ccc;" onerror="handleImgError(this)"></td>
        <td>${user.title || ''}</td>
        <td>${user.fname || ''}</td>
        <td>${user.lname || ''}</td>
        <td>${user.email}</td>
        <td>${user.addressline || ''}</td>
        <td>${user.town || ''}</td>
        <td>${user.phone || ''}</td>
        <td><span class="role-badge ${roleClass}">${user.role.charAt(0).toUpperCase() + user.role.slice(1)}</span></td>
        <td><span class="status-badge ${statusClass}">${user.status.charAt(0).toUpperCase() + user.status.slice(1)}</span></td>
        <td>
          <div class="action-buttons">
            <button class="btn btn-sm btn-warning roleBtn" data-id="${user.user_id}" title="Edit Role" data-toggle="tooltip">
              <i class="fas fa-user-cog"></i>
            </button>
            <button class="btn btn-sm btn-secondary statusBtn" data-id="${user.user_id}" title="Change Status" data-toggle="tooltip">
              <i class="fas fa-user-check"></i>
            </button>
          </div>
        </td>
      </tr>`;
    }

    // ========== SORTING FUNCTIONS ========== //
    // Sort users array
    function sortUsers(users, field, direction) {
      return users.sort((a, b) => {
        let aVal = a[field] || '';
        let bVal = b[field] || '';
        
        // Convert to string for comparison
        aVal = String(aVal).toLowerCase();
        bVal = String(bVal).toLowerCase();
        
        if (direction === 'asc') {
          return aVal.localeCompare(bVal);
        } else {
          return bVal.localeCompare(aVal);
        }
      });
    }
    
    // Update sort indicators
    function updateSortIndicators(field, direction) {
      $('.sortable').removeClass('sort-asc sort-desc');
      $(`.sortable[data-sort="${field}"]`).addClass(direction === 'asc' ? 'sort-asc' : 'sort-desc');
    }
    
    // Render sorted users
    function renderSortedUsers() {
      $('#ubody').empty();
      if (allUsers.length === 0) {
        $('#ubody').append('<tr><td colspan="12" class="text-center">No users found.</td></tr>');
        return;
      }
      
      // Apply search filter if needed
      let filteredUsers = allUsers;
      if (searchTerm) {
        filteredUsers = allUsers.filter(user => 
          (user.fname && user.fname.toLowerCase().includes(searchTerm.toLowerCase())) ||
          (user.lname && user.lname.toLowerCase().includes(searchTerm.toLowerCase())) ||
          (user.email && user.email.toLowerCase().includes(searchTerm.toLowerCase())) ||
          (user.phone && user.phone.toLowerCase().includes(searchTerm.toLowerCase())) ||
          (user.town && user.town.toLowerCase().includes(searchTerm.toLowerCase()))
        );
      }
      
      // Apply sorting
      const sortedUsers = sortUsers(filteredUsers, currentSort.field, currentSort.direction);
      
      // Render users
      sortedUsers.forEach(user => {
        $('#ubody').append(renderUserRow(user));
      });
    }
    
    // ========== DATA FETCHING ========== //
    // Fetch users from API
    function fetchUsers(page, append = true) {
      if (loading) return;
      loading = true;
      $('#ubody').append('<tr class="loading-row"><td colspan="12" class="text-center">Loading...</td></tr>');
      let apiUrl = `${url}api/users/users?page=${page}&limit=${pageSize}`;
      if (searchTerm) apiUrl += `&search=${encodeURIComponent(searchTerm)}`;
      $.ajax({
        url: apiUrl,
        method: 'GET',
        dataType: 'json',
        success: function (data) {
          $('.loading-row').remove();
          let users = data.rows || data.data || data;
          if (!Array.isArray(users)) users = [];
          
          if (!append) {
            allUsers = users;
          } else {
            allUsers = allUsers.concat(users);
          }
          
          if (users.length < pageSize) allLoaded = true;
          
          // Render sorted users
          renderSortedUsers();
          loading = false;
        },
        error: function () {
          $('.loading-row').remove();
          loading = false;
          Swal.fire({
            icon: 'error',
            title: 'Error!',
            text: 'Failed to load user data. Please check your connection and try again.',
          });
        }
      });
    }

    // ========== INITIALIZATION ========== //
    // Initial load of users
    fetchUsers(currentPage);
    
    // Initialize sort indicators
    updateSortIndicators(currentSort.field, currentSort.direction);

    // ========== EVENT HANDLERS ========== //
    // Column sorting click handler
    $(document).on('click', '.sortable', function(e) {
      e.preventDefault();
      const field = $(this).data('sort');
      
      // Toggle sort direction
      if (currentSort.field === field) {
        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.field = field;
        currentSort.direction = 'asc';
      }
      
      // Update visual indicators
      updateSortIndicators(currentSort.field, currentSort.direction);
      
      // Re-render the table with sorted data
      renderSortedUsers();
    });
    
    // Infinite scroll handler
    $('.table-responsive').on('scroll', function () {
      const $this = $(this);
      if ($this[0].scrollHeight - $this.scrollTop() - $this.outerHeight() < 100) {
        if (!loading && !allLoaded) {
          currentPage++;
          fetchUsers(currentPage);
        }
      }
    });

    // ========== SEARCH FUNCTIONALITY ========== //
    // Search functionality
    $('#userSearch').on('keyup', function (e) {
      if (e.key === 'Enter' || this.value === '' || this.value.length > 2) {
        searchTerm = this.value;
        currentPage = 1;
        allLoaded = false;
        allUsers = []; // Clear existing data for new search
        fetchUsers(currentPage, false);
      }
    });
    $('#searchButton').on('click', function () {
      searchTerm = $('#userSearch').val();
      currentPage = 1;
      allLoaded = false;
      allUsers = []; // Clear existing data for new search
      fetchUsers(currentPage, false);
    });

    // ========== MODAL HANDLING ========== //
    // Add User button - opens the modal
    $(document).on('click', '.btn.btn-success[data-toggle="modal"]', function () {
      $("#uform").trigger("reset");
      $('#userModal').modal('show');
      $('#role-description').text('');
      $('#userModalLabel').text('Add New User');
    });

    // ========== FORM SUBMISSION ========== //
    // Submit new user - main form submission handler
    $("#userSubmit").on('click', function (e) {
      e.preventDefault();
      
      // Prevent multiple submissions
      const $submitBtn = $(this);
      if ($submitBtn.prop('disabled')) {
        return false;
      }
      
      // Disable button and show loading
      $submitBtn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Creating...');
      
      // Check if jQuery validation plugin is loaded
      if (typeof $.validator !== 'undefined' && $('#uform').valid) {
        if (!$('#uform').valid()) {
          Swal.fire({
            icon: 'error',
            title: 'Form Incomplete',
            text: 'Please fill out all required fields correctly before submitting.'
          });
          $submitBtn.prop('disabled', false).html('Add User');
          return false;
        }
      } else {
        // Manual validation as fallback
        const fname = $('#user_fname').val().trim();
        const lname = $('#user_lname').val().trim();
        const email = $('#user_email').val().trim();
        const password = $('#user_password').val();
        const role = $('#user_role').val();
        
        let errors = [];
        
        if (!fname) errors.push('First name is required');
        if (!lname) errors.push('Last name is required');
        if (!email) errors.push('Email is required');
        if (!password) errors.push('Password is required');
        if (!role) errors.push('Role is required');
        
        if (errors.length > 0) {
          Swal.fire({
            icon: 'error',
            title: 'Form Incomplete',
            text: errors.join('\n')
          });
          $submitBtn.prop('disabled', false).html('Add User');
          return false;
        }
      }
      
      // Use FormData for file upload
      let formData = new FormData($('#uform')[0]);
      
      Swal.fire({
        title: 'Creating User...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });
      $.ajax({
        method: "POST",
        url: `${url}api/users/users`,
        data: formData,
        processData: false,
        contentType: false,
        dataType: "json",
        timeout: 30000, // 30 second timeout
        success: function (data) {
          // Close modal using Bootstrap's modal method or jQuery
          try {
            if (typeof bootstrap !== 'undefined' && bootstrap.Modal) {
              const modal = bootstrap.Modal.getInstance(document.getElementById('userModal'));
              if (modal) modal.hide();
            } else if (typeof $ !== 'undefined' && $.fn.modal) {
              $("#userModal").modal("hide");
            } else {
              // Fallback: hide modal manually
              $("#userModal").hide();
              $(".modal-backdrop").remove();
              $("body").removeClass("modal-open");
            }
          } catch (e) {
            // Fallback: hide modal manually
            $("#userModal").hide();
            $(".modal-backdrop").remove();
            $("body").removeClass("modal-open");
          }
          
          currentPage = 1;
          allLoaded = false;
          fetchUsers(currentPage, false);
          Swal.fire({
            icon: 'success',
            title: 'User Added!',
            text: 'New user has been added successfully.',
            timer: 2000,
            showConfirmButton: false
          });
          
          // Reset button
          $submitBtn.prop('disabled', false).html('Add User');
        },
        error: function (xhr, status, error) {
          // Close any open loading dialogs
          Swal.close();
          
          let errorMessage = 'Failed to add user. Please try again.';
          
          if (status === 'timeout') {
            errorMessage = 'Request timed out. Please try again.';
          } else if (xhr.responseJSON && xhr.responseJSON.error) {
            errorMessage = xhr.responseJSON.error;
          } else if (xhr.status === 0) {
            errorMessage = 'Network error. Please check your connection.';
          }
          
          Swal.fire({
            icon: 'error',
            title: 'Error!',
            text: errorMessage,
          });
          
          // Reset button
          $submitBtn.prop('disabled', false).html('Add User');
        }
      });
    });



    // ========== USER MANAGEMENT ACTIONS ========== //
    // Change role button click handler
    $('#ubody').on('click', 'button.roleBtn', function (e) {
      e.preventDefault();
      var id = $(this).data('id');
      $('#role_user_id').val(id);
      $('#roleModal').modal('show');
    });
    // Submit role change
    $("#roleSubmit").on('click', function (e) {
      e.preventDefault();
      if (!$('#roleForm')[0].checkValidity()) {
        $('#roleForm')[0].reportValidity();
        return;
      }
      var userId = $('#role_user_id').val();
      var newRole = $('#new_role').val();
      Swal.fire({
        title: 'Updating Role...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });
      $.ajax({
        method: "PUT",
        url: `${url}api/users/users/${userId}/role`,
        data: JSON.stringify({ role: newRole }),
        contentType: 'application/json',
        dataType: "json",
        success: function (data) {
          $('#roleModal').modal("hide");
          currentPage = 1;
          allLoaded = false;
          fetchUsers(currentPage, false);
          Swal.fire({
            icon: 'success',
            title: 'Role Updated!',
            text: 'User role has been updated successfully.',
            timer: 2000,
            showConfirmButton: false
          });
        },
        error: function (xhr) {
          Swal.fire({
            icon: 'error',
            title: 'Error!',
            text: xhr.responseJSON?.error || 'Failed to update role. Please try again.',
          });
        }
      });
    });
    // Change status button click handler
    $('#ubody').on('click', 'button.statusBtn', function (e) {
      e.preventDefault();
      var id = $(this).data('id');
      $('#status_user_id').val(id);
      $('#statusModal').modal('show');
    });
    // Submit status change
    $("#statusSubmit").on('click', function (e) {
      e.preventDefault();
      if (!$('#statusForm')[0].checkValidity()) {
        $('#statusForm')[0].reportValidity();
        return;
      }
      var userId = $('#status_user_id').val();
      var newStatus = $('#new_status').val();
      Swal.fire({
        title: 'Updating Status...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });
      $.ajax({
        method: "PUT",
        url: `${url}api/users/users/${userId}/status`,
        data: JSON.stringify({ status: newStatus }),
        contentType: 'application/json',
        dataType: "json",
        success: function (data) {
          $('#statusModal').modal("hide");
          currentPage = 1;
          allLoaded = false;
          fetchUsers(currentPage, false);
          Swal.fire({
            icon: 'success',
            title: 'Status Updated!',
            text: 'User status has been updated successfully.',
            timer: 2000,
            showConfirmButton: false
          });
        },
        error: function (xhr) {
          Swal.fire({
            icon: 'error',
            title: 'Error!',
            text: xhr.responseJSON?.error || 'Failed to update status. Please try again.',
          });
        }
      });
    });

    // ========== MODAL CLEANUP ========== //
    // Reset forms when modals are hidden
    $('#userModal').on('hidden.bs.modal', function () {
      $('#uform')[0].reset();
      $('#userModalLabel').text('Add New User');

    });
    $('#statusModal').on('hidden.bs.modal', function () {

    });

    $('#uform').validate({

    // ========== PASSWORD STRENGTH ========== //
    // Simple password strength indicator
    $('#user_password').on('input', function() {
      const password = $(this).val();
      const strengthDiv = $('#password-strength');
      
      if (password.length === 0) {
        strengthDiv.text('').removeClass('weak medium strong');
        return;
      }
      
      let strength = 0;
      if (password.length >= 6) strength += 1;
      if (/[a-z]/.test(password)) strength += 1;
      if (/[A-Z]/.test(password)) strength += 1;
      if (/[0-9]/.test(password)) strength += 1;
      
      if (strength <= 2) {
        strengthDiv.text('Weak password').removeClass('medium strong').addClass('weak');
      } else if (strength <= 3) {
        strengthDiv.text('Medium strength password').removeClass('weak strong').addClass('medium');
      } else {
        strengthDiv.text('Strong password').removeClass('weak medium').addClass('strong');
      }
    });
    
    // ========== REAL-TIME VALIDATION ========== //
    // Real-time validation feedback
    $('#uform input, #uform select').on('blur', function() {
      $(this).valid();
    });
    
    // Clear validation on modal close
    $('#userModal').on('hidden.bs.modal', function() {
      $('#uform').validate().resetForm();
      $('#uform .form-control').removeClass('is-valid is-invalid');
      $('#password-strength').text('').removeClass('weak medium strong');
    });
    
    // Debugging code removed for cleaner production
});
